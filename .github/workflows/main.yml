name: Ubuntu Desktop RDP
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Replace 'rdp-node' with whatever name you want
          sudo tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname=ubuntu-desktop --accept-routes
          echo "Your Tailscale IP is: $(tailscale ip -4)"

      - name: Install Ubuntu Desktop (GNOME)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt update
          # ubuntu-desktop-minimal is faster to install than the full version
          sudo apt install -y ubuntu-desktop-minimal xrdp
          
      - name: Setup RDP User
        run: |
          # This sets the password for the 'runner' user to 'P@ssword123'
          # CHANGE THIS if you want a different password
          echo "runner:P@ssword123" | sudo chpasswd
          sudo adduser xrdp ssl-cert
          sudo systemctl restart xrdp

      - name: Keep Alive (6 Hours)
        run: sleep 21600
