name: Windows Server 2022 Full GUI with Tailscale

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  desktop:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tailscale
        run: |
          choco install tailscale -y
          
      - name: Wait for Tailscale Installation
        run: |
          Start-Sleep -Seconds 15
          
      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $env:Path += ";C:\Program Files\Tailscale"
          tailscale up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=gh-actions-windows-2022
          
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
      - name: Start Desktop Environment
        run: |
          Start-Process explorer.exe
          Start-Process "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          
      - name: Keep Runner Active
        run: |
          Start-Sleep -Seconds 3600
